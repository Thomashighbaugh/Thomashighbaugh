name: Generate AI Bio (Weekly)

on:
  schedule:
    # Run every Monday at 02:00 UTC
    - cron: '0 2 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-bio:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate AI bio via Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-ai-bio.js

      - name: Commit and push bio cache
        run: |
          git config --global user.email "ai-bio-bot@github.com"
          git config --global user.name "AI Bio Bot"
          git add ai-bio-cache.md
          git diff --cached --quiet || git commit -m "chore: update AI-generated bio for the week"
          git push
